<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Powered House Price Prediction. Enter real-world statistics to accurately predict housing values.">
    <title>NexEstate | AI Price Predictor</title>
    <!-- Modern typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated animated background elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <main class="glass-container">
        <header>
            <h1>NexEstate<span class="dot">.</span></h1>
            <p>AI-Powered House Price Predictor</p>
        </header>

        <form id="prediction-form">
            <div class="input-group">
                <label for="medInc">Median Income (in $10k)</label>
                <div class="input-wrapper">
                    <span class="icon">💰</span>
                    <input type="number" id="medInc" step="0.01" placeholder="e.g. 5.12" required>
                </div>
            </div>

            <div class="input-group">
                <label for="houseAge">House Age (Years)</label>
                <div class="input-wrapper">
                    <span class="icon">📅</span>
                    <input type="number" id="houseAge" step="1" placeholder="e.g. 25" required>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="aveRooms">Avg Rooms</label>
                    <div class="input-wrapper">
                        <span class="icon">🚪</span>
                        <input type="number" id="aveRooms" step="0.1" placeholder="e.g. 6.2" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="aveBedrms">Avg Bedrooms</label>
                    <div class="input-wrapper">
                        <span class="icon">🛏️</span>
                        <input type="number" id="aveBedrms" step="0.1" placeholder="e.g. 1.1" required>
                    </div>
                </div>
            </div>

            <button type="submit" id="predict-btn">
                <span>Predict Price</span>
                <span class="loader" id="btn-loader"></span>
            </button>
        </form>

        <section id="result-section" class="hidden">
            <h3 class="result-label">Estimated Value</h3>
            <div id="price-reveal" class="price-value">$0.00</div>
        </section>
        
        <div id="error-message" class="hidden error"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
